# =============================================================================
# Paperclip Docker Compose - Development
# =============================================================================
# Development environment with hot-reload and debugging support
# 
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f
# =============================================================================

services:
  # =============================================================================
  # Paperclip Development Server
  # =============================================================================
  paperclip-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: paperclip-dev
    restart: unless-stopped
    profiles:
      - development
    ports:
      - "3100:3100"    # Main server
      - "9229:9229"    # Node.js debug port
      - "5173:5173"    # Vite dev server (if separate)
    volumes:
      # Mount source code for hot-reload
      - .:/app
      # Mount data directory
      - paperclip-dev-data:/app/data
      # Mount logs
      - ./logs:/app/logs
    networks:
      - dev-network
    environment:
      - NODE_ENV=development
      - PORT=3100
      - HOST=0.0.0.0
      - SERVE_UI=true
      - PAPERCLIP_HOME=/app/data
      - NODE_OPTIONS=--enable-source-maps
      # Database - use embedded PGlite in dev
      - DATABASE_URL=file:./data/pglite/paperclip.db
      # AI API Keys (set in .env)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3100/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    stdin_open: true
    tty: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # =============================================================================
  # PostgreSQL Database (Development)
  # =============================================================================
  db-dev:
    image: postgres:17-alpine
    container_name: paperclip-db-dev
    restart: unless-stopped
    profiles:
      - development
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-paperclip}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-paperclip_dev}
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperclip} -d ${POSTGRES_DB:-paperclip_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # =============================================================================
  # Redis (Development)
  # =============================================================================
  redis-dev:
    image: redis:7-alpine
    container_name: paperclip-redis-dev
    restart: unless-stopped
    profiles:
      - development
    ports:
      - "6379:6379"
    volumes:
      - redis-dev-data:/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  # =============================================================================
  # Mailhog (Development - Email catching)
  # =============================================================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: paperclip-mailhog-dev
    restart: unless-stopped
    profiles:
      - development
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    networks:
      - dev-network

  # =============================================================================
  # Redis Commander (Development - Redis GUI)
  # =============================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: paperclip-redis-commander-dev
    restart: unless-stopped
    profiles:
      - development
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis-dev:6379
    networks:
      - dev-network
    depends_on:
      - redis-dev

# =============================================================================
# Networks
# =============================================================================
networks:
  dev-network:
    driver: bridge
    name: paperclip-dev-network

# =============================================================================
# Volumes
# =============================================================================
volumes:
  paperclip-dev-data:
  pgdata-dev:
  redis-dev-data:
