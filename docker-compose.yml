# =============================================================================
# Paperclip Docker Compose - Home Server
# =============================================================================
# Optimized for: 7GB RAM, VPN-only access (Tailscale)
# Includes: Paperclip + OpenCode + PostgreSQL + Redis + Traefik
# 
# Usage:
#   docker compose up -d
#   docker compose ps
# =============================================================================

services:
  # =============================================================================
  # Traefik Reverse Proxy
  # =============================================================================
  traefik:
    image: traefik:v3.0
    container_name: paperclip-traefik
    restart: unless-stopped
    ports:
      - "8443:443"
      - "8080:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-certs:/certs
      - traefik-logs:/var/log/traefik
    networks:
      - backend
    environment:
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8090/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"

  # =============================================================================
  # Paperclip Main Instance
  # =============================================================================
  paperclip:
    image: reeoss/paperclipai-paperclip:latest
    container_name: paperclip-app
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - paperclip-data:/paperclip
      - paperclip-logs:/app/logs
    networks:
      - backend
    environment:
      - NODE_ENV=production
      - PORT=3100
      - HOST=0.0.0.0
      - SERVE_UI=true
      - PAPERCLIP_HOME=/paperclip
      - PAPERCLIP_INSTANCE_ID=home-server
      - PAPERCLIP_CONFIG=/paperclip/instances/home-server/config.json
      - PAPERCLIP_DEPLOYMENT_MODE=authenticated
      - PAPERCLIP_DEPLOYMENT_EXPOSURE=vpn
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENCODE_API_URL=http://opencode:4096
      - OPENCODE_API_PASSWORD=${OPENCODE_API_PASSWORD}
      - LOG_LEVEL=warn
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      opencode:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1.5G
        reservations:
          cpus: '0.25'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 3
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/health || curl -sf http://localhost:3100/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.paperclip.rule=Host(`paperclip`)"
      - "traefik.http.routers.paperclip.entrypoints=websecure"
      - "traefik.http.routers.paperclip.tls=true"
      - "traefik.http.services.paperclip.loadbalancer.server.port=3100"
      - "traefik.docker.network=backend"

  # =============================================================================
  # OpenCode AI Agent (Groq API)
  # =============================================================================
  opencode:
    build:
      context: ./opencode
      dockerfile: Dockerfile.opencode
    image: opencode:local
    container_name: paperclip-opencode
    restart: unless-stopped
    ports:
      - "4096:4096"
    networks:
      - backend
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENCODE_SERVER_PASSWORD=${OPENCODE_API_PASSWORD}
      - TZ=UTC
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:4096/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # =============================================================================
  # PostgreSQL Database
  # =============================================================================
  db:
    image: postgres:17-alpine
    container_name: paperclip-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    command:
      - postgres
      - -c
      - shared_buffers=192MB
      - -c
      - max_connections=50
      - -c
      - effective_cache_size=384MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - wal_buffers=8MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - max_wal_size=512MB
      - -c
      - min_wal_size=64MB
      - -c
      - random_page_cost=1.1
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  # =============================================================================
  # Redis (Session/Cache)
  # =============================================================================
  redis:
    image: redis:7-alpine
    container_name: paperclip-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --tcp-backlog 128
      --timeout 300
    volumes:
      - redis-data:/data
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

# =============================================================================
# Networks
# =============================================================================
networks:
  backend:
    driver: bridge
    name: paperclip-backend
    ipam:
      config:
        - subnet: 172.28.0.0/16

# =============================================================================
# Volumes
# =============================================================================
volumes:
  paperclip-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PAPERCLIP_DATA_DIR:-./data/paperclip}
  paperclip-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PAPERCLIP_LOGS_DIR:-./logs}
  pgdata:
  redis-data:
    driver: local
  traefik-certs:
  traefik-logs:
