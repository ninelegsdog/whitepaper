# =============================================================================
# Paperclip Docker Compose - Monitoring Stack
# =============================================================================
# Prometheus + Grafana for metrics and observability
# 
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.monitoring.yml up -d
# =============================================================================

services:
  # =============================================================================
  # Prometheus
  # =============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: paperclip-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - prometheus-data:/prometheus
    networks:
      - backend
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-admin-api'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Grafana
  # =============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: paperclip-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - backend
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD is required}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN:-192.168.0.186}
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://192.168.0.186:3000}
      - GF_FEATURE_TOGGLES_ENABLE=publicDashboards
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/api/health || curl -sf http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Alertmanager
  # =============================================================================
  alertmanager:
    image: prom/alertmanager:latest
    container_name: paperclip-alertmanager
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    networks:
      - backend
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    depends_on:
      prometheus:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Node Exporter (for host metrics)
  # =============================================================================
  node-exporter:
    image: prom/node-exporter:latest
    container_name: paperclip-node-exporter
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:9100:9100"
    networks:
      - backend
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9100/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # cAdvisor (Container metrics)
  # =============================================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: paperclip-cadvisor
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:8080:8080"
    networks:
      - backend
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    environment:
      - CZLOG_LEVEL=4
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Loki (Log aggregation)
  # =============================================================================
  loki:
    image: grafana/loki:latest
    container_name: paperclip-loki
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "127.0.0.1:3101:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - backend
    command: -config.file=/etc/loki/local-config.yaml
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # =============================================================================
  # Promtail (Log shipping to Loki)
  # =============================================================================
  promtail:
    image: grafana/promtail:latest
    container_name: paperclip-promtail
    restart: unless-stopped
    profiles:
      - monitoring
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
    networks:
      - backend
    command: -config.file=/etc/promtail/config.yml
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# =============================================================================
# Networks
# =============================================================================
networks:
  backend:
    name: paperclip-backend

# =============================================================================
# Volumes
# =============================================================================
volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
  loki-data:
