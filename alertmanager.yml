# =============================================================================
# Alertmanager Configuration
# =============================================================================

global:
  resolve_timeout: 5m
  smtp_smarthost: 'localhost:25'
  smtp_from: 'alertmanager@paperclip.local'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
    - match:
        severity: warning
      receiver: 'warning-alerts'

receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://paperclip:3100/api/alerts/webhook'

  - name: 'critical-alerts'
    webhook_configs:
      - url: 'http://paperclip:3100/api/alerts/webhook'
    opsgenie_configs:
      - api_key: '${OPSGENIE_API_KEY}'
        message: 'Critical Alert: {{ .GroupLabels.alertname }}'

  - name: 'warning-alerts'
    webhook_configs:
      - url: 'http://paperclip:3100/api/alerts/webhook'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
