# =============================================================================
# Traefik Configuration - Home Server with Tailscale
# =============================================================================
# Optimized for VPN-only access via Tailscale DNS
# No custom domain required
# =============================================================================

# =============================================================================
# Global Configuration
# =============================================================================
global:
  checkNewVersion: false
  sendAnonymousUsage: false

# =============================================================================
# Entry Points (Ports)
# =============================================================================
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: selfsigned
        domains:
          - main: "paperclip"
            sans:
              - "localhost"
              - "paperclip.tailnet"

# =============================================================================
# Certificate Management
# =============================================================================
certificatesResolvers:
  selfsigned:
    acme:
      email: ${LETSENCRYPT_EMAIL}
      storage: /certs/acme.json
      # Self-signed for Tailscale (no external validation needed)
      # Certificate is generated automatically

# =============================================================================
# Docker Provider
# =============================================================================
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: backend
    watch: true
    useBindPortIP: false

  file:
    directory: /etc/traefik/dynamic
    watch: true

# =============================================================================
# API and Dashboard (disabled for security)
# =============================================================================
api:
  dashboard: false
  insecure: false

# =============================================================================
# Logging
# =============================================================================
log:
  level: WARN
  filePath: /var/log/traefik/traefik.log
  format: json

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  bufferingSize: 50
  filters:
    statusCodes:
      - "200-599"
  fields:
    defaultMode: keep
    headers:
      defaultMode: keep
      names:
        User-Agent: redact
        Authorization: redact

# =============================================================================
# Server Configuration
# =============================================================================
serversTransport:
  insecureSkipVerify: false
  maxIdleConnsPerHost: 50
  forwardingTimeouts:
    dialTimeout: 10s
    responseHeaderTimeout: 0s

# =============================================================================
# Ping
# =============================================================================
ping:
  entryPoint: websecure
