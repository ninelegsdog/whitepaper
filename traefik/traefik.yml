# =============================================================================
# Traefik Configuration - Production with VPN/Tailscale
# =============================================================================
# Reverse proxy with automatic HTTPS, load balancing, and metrics
# Designed for VPN-only access via Tailscale
# =============================================================================

# =============================================================================
# Global Configuration
# =============================================================================
global:
  checkNewVersion: true
  sendAnonymousUsage: false

# =============================================================================
# Entry Points (Ports)
# =============================================================================
entryPoints:
  # HTTPS only - all HTTP traffic redirected to HTTPS
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  # Secure HTTPS endpoint
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
        domains:
          - main: "paperclip.local"
            sans:
              - "*.paperclip.local"
      # HSTS headers
      middlewares:
        - secure-headers

# =============================================================================
# Certificate Management (Let's Encrypt)
# =============================================================================
certificatesResolvers:
  letsencrypt:
    acme:
      tlschallenge: true
      email: "${LETSENCRYPT_EMAIL:-admin@example.com}"
      storage: /certs/acme.json"
      # Staging for testing (remove in production)
      # caServer: https://acme-staging-v02.api.letsencrypt.org/directory

# =============================================================================
# Docker Provider (Dynamic Configuration)
# =============================================================================
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: backend
    # Watch for changes
    watch: true
    # Use labels to configure routes
    useBindPortIP: false
    # Swarm mode (disabled for compose)
    swarmMode: false

  # File provider for static routes
  file:
    directory: /etc/traefik/dynamic
    watch: true

# =============================================================================
# API and Dashboard
# =============================================================================
api:
  dashboard: true
  insecure: false

# =============================================================================
# Metrics (Prometheus)
# =============================================================================
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    entryPoint: metrics
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0

# =============================================================================
# Access Logging
# =============================================================================
log:
  level: INFO
  filePath: /var/log/traefik/traefik.log
  format: json

accessLog:
  filePath: /var/log/traefik/access.log
  format: json
  bufferingSize: 100
  filters:
    statusCodes:
      - "200-599"
  fields:
    defaultMode: keep
    headers:
      defaultMode: keep
      names:
        User-Agent: redact
        Authorization: redact
        X-Forwarded-Token: redact

# =============================================================================
# Server Configuration
# =============================================================================
serversTransport:
  insecureSkipVerify: false
  maxIdleConnsPerHost: 200
  forwardingTimeouts:
    dialTimeout: 30s
    responseHeaderTimeout: 0s

# =============================================================================
# Ping
# =============================================================================
ping:
  entryPoint: web

# =============================================================================
# Responding to DNS challenges for Tailscale
# =============================================================================
# Note: For Tailscale integration, DNS is managed by Tailscale itself
