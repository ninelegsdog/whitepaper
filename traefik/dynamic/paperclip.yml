# =============================================================================
# Paperclip Router Configuration - Single Instance
# =============================================================================
# Optimized for home server with Tailscale
# =============================================================================

http:
  # ============================================================================
  # Routers
  # ============================================================================
  routers:
    paperclip:
      rule: "Host(`paperclip`) || Host(`localhost`)"
      service: paperclip-service
      entryPoints:
        - websecure
      tls: {}
      middlewares:
        - secure-headers

    paperclip-health:
      rule: "PathPrefix(`/health`)"
      service: paperclip-health-service
      entryPoints:
        - websecure

  # ============================================================================
  # Services (Single Instance)
  # ============================================================================
  services:
    paperclip-service:
      loadBalancer:
        servers:
          - url: "http://paperclip:3100"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 10s
          expectedStatusCode: 200
        method: "wrr"

    paperclip-health-service:
      loadBalancer:
        servers:
          - url: "http://paperclip:3100"
        healthCheck:
          path: /health
          interval: 10s
          timeout: 5s
