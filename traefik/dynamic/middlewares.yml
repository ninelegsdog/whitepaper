# =============================================================================
# Traefik Middlewares - Dynamic Configuration
# =============================================================================
# Security headers, rate limiting, and other middleware
# =============================================================================

http:
  # =============================================================================
  # Security Headers
  # =============================================================================
  middlewares:
    # HSTS and security headers
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: "strict-origin-when-cross-origin"
        customFrameOptionsValue: "SAMEORIGIN"
        customResponseHeaders:
          X-Robots-Tag: "noindex, nofollow"
          X-Paperclip-Version: "1.0"
        sslRedirect: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    # Rate limiting for API endpoints
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
        period: 1s

    # Circuit breaker for backend failures
    circuit-breaker:
      circuitBreaker:
        expression: "NetworkErrorRatio > 0.30 || ResponseCodeRatio(useStatusCode,500, 600, 0, 600) > 0.25"

    # Retry on failures
    retry:
      retry:
        attempts: 3
        initialInterval: 100ms

    # Compress responses
    compress:
      compress: {}

    # Add prefix to path
    strip-prefix:
      stripPrefix:
        prefixes:
          - "/api"

    # Add latency for testing
    delay:
      delay:
        amount: 0ms

# =============================================================================
# TLS Configuration
# =============================================================================
tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
      curvePreferences:
        - CurveP521
        - CurveP384
      sniStrict: true
